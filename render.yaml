services:
  - type: web
    name: pystart-api
    env: python
    plan: free
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: GROQ_API_KEY
        sync: false
